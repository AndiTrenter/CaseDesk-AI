# ============================================================
# CaseDesk AI - Docker Compose (Entwicklung)
# ============================================================
# Für lokale Entwicklung mit Build von Source
# Produktion: Verwende docker-compose.unraid.yml
#
# HINWEIS: MongoDB 5.0+ benötigt AVX-Support. Falls Ihre CPU
# kein AVX unterstützt, nutzen Sie MONGO_VERSION=4.4 in .env
# ============================================================

services:
  mongodb:
    image: mongo:${MONGO_VERSION:-4.4}
    container_name: casedesk-mongodb
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=${DB_NAME:-casedesk}
    networks:
      - default

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: casedesk-backend
    restart: unless-stopped
    depends_on:
      - mongodb
      - ollama
    environment:
      - MONGO_URL=mongodb://mongodb:27017/${DB_NAME:-casedesk}
      - UPLOAD_DIR=/app/uploads
      - AI_PROVIDER=${AI_PROVIDER:-openai}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OLLAMA_URL=${OLLAMA_URL:-http://ollama:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
      - OCR_SERVICE_URL=http://ocr:8002
      - SECRET_KEY=${SECRET_KEY:-dev-secret-change-in-production}
    volumes:
      - uploads_data:/app/uploads
    networks:
      - default

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_BACKEND_URL: ""
    container_name: casedesk-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-9090}:80"
    networks:
      - default

  ocr:
    build:
      context: ./ocr
      dockerfile: Dockerfile
    container_name: casedesk-ocr
    restart: unless-stopped
    environment:
      - TESSDATA_PREFIX=/usr/share/tesseract-ocr/5/tessdata
    networks:
      - default

  # Ollama - Lokale KI (immer aktiv als Fallback)
  ollama:
    image: ollama/ollama:latest
    container_name: casedesk-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - default
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Ollama Modell-Initialisierer (lädt Modell automatisch)
  ollama-init:
    image: curlimages/curl:latest
    container_name: casedesk-ollama-init
    depends_on:
      ollama:
        condition: service_started
    environment:
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Warte auf Ollama..."
        until curl -s http://ollama:11434/api/tags > /dev/null 2>&1; do
          echo "Ollama noch nicht bereit, warte 5s..."
          sleep 5
        done
        echo "Ollama ist bereit!"
        
        # Prüfe ob Modell existiert
        if curl -s http://ollama:11434/api/tags | grep -q "$${OLLAMA_MODEL}"; then
          echo "Modell $${OLLAMA_MODEL} bereits vorhanden"
        else
          echo "Lade Modell $${OLLAMA_MODEL} herunter..."
          curl -X POST http://ollama:11434/api/pull -d "{\"name\": \"$${OLLAMA_MODEL}\"}"
          echo "Modell heruntergeladen!"
        fi
    networks:
      - default
    restart: "no"

volumes:
  mongodb_data:
    driver: local
  uploads_data:
    driver: local
  ollama_data:
    driver: local

networks:
  default:
    name: casedesk-network
