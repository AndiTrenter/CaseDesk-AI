# ============================================
# CaseDesk AI - Entwickler-Compose (lokaler Build)
# ============================================
# Nur fuer lokale Entwicklung.
# Fuer Produktion/Unraid: docker-compose.unraid.yml
# ============================================

services:
  mongodb:
    image: mongo:7
    container_name: casedesk-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-casedesk}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-casedesk_secret}
    volumes:
      - mongodb_data:/data/db
    ports:
      - "${MONGO_PORT:-27017}:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: casedesk-backend
    environment:
      MONGO_URL: mongodb://${MONGO_USER:-casedesk}:${MONGO_PASSWORD:-casedesk_secret}@mongodb:27017
      DB_NAME: ${DB_NAME:-casedesk}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key}
      AI_PROVIDER: ${AI_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      UPLOAD_DIR: /app/uploads
      OCR_SERVICE_URL: http://ocr:8002
      CORS_ORIGINS: "*"
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "${BACKEND_PORT:-8001}:8001"
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_BACKEND_URL: ""
    container_name: casedesk-frontend
    ports:
      - "${FRONTEND_PORT:-9090}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  ocr:
    build:
      context: ./ocr
      dockerfile: Dockerfile
    container_name: casedesk-ocr
    volumes:
      - uploads_data:/app/uploads:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: casedesk-ollama
    profiles:
      - ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 5 && ollama pull ${OLLAMA_MODEL:-llama3.2} && wait"]

volumes:
  mongodb_data:
  uploads_data:
  ollama_data:

networks:
  default:
    name: casedesk-network
