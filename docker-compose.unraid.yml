# ============================================================
# CaseDesk AI - Docker Compose für Unraid
# ============================================================
# Optimiert für Unraid NAS
# Keine künstlichen Ressourcen-Limits
# ============================================================
#
# Installation:
#   1. cp .env.example .env
#   2. nano .env  (Werte anpassen)
#   3. docker compose -f docker-compose.unraid.yml up -d
#
# Mit lokaler KI (Ollama):
#   docker compose -f docker-compose.unraid.yml --profile ollama up -d
#
# Web-Oberfläche: http://[DEINE-IP]:9090
#
# HINWEIS: MongoDB 5.0+ benötigt AVX-Support. Falls Ihre CPU
# kein AVX unterstützt, nutzen Sie MONGO_VERSION=4.4 in .env
# ============================================================

services:
  mongodb:
    image: mongo:${MONGO_VERSION:-4.4}
    container_name: casedesk-mongodb
    restart: unless-stopped
    volumes:
      - /mnt/user/appdata/casedesk/mongodb:/data/db
    environment:
      - MONGO_INITDB_DATABASE=${DB_NAME:-casedesk}
    networks:
      - default
    # Keine Memory-Limits - MongoDB verwaltet Cache selbstständig

  backend:
    image: ghcr.io/anditrenter/casedesk-ai/backend:latest
    container_name: casedesk-backend
    restart: unless-stopped
    depends_on:
      - mongodb
    environment:
      - MONGO_URL=mongodb://mongodb:27017/${DB_NAME:-casedesk}
      - UPLOAD_DIR=/app/uploads
      - AI_PROVIDER=${AI_PROVIDER:-openai}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OLLAMA_URL=${OLLAMA_URL:-http://ollama:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
      - OCR_SERVICE_URL=http://ocr:8002
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
    volumes:
      - /mnt/user/appdata/casedesk/uploads:/app/uploads
    networks:
      - default
    # Backend intern auf Port 8001 - nicht exponiert

  frontend:
    image: ghcr.io/anditrenter/casedesk-ai/frontend:latest
    container_name: casedesk-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-9090}:80"
    networks:
      - default

  ocr:
    image: ghcr.io/anditrenter/casedesk-ai/ocr:latest
    container_name: casedesk-ocr
    restart: unless-stopped
    environment:
      - TESSDATA_PREFIX=/usr/share/tesseract-ocr/5/tessdata
    networks:
      - default
    # Tesseract OCR mit Deutsch + Englisch

  # Ollama - Lokale KI (optional)
  # Starten mit: --profile ollama
  ollama:
    image: ollama/ollama:latest
    container_name: casedesk-ollama
    profiles:
      - ollama
    restart: unless-stopped
    volumes:
      - /mnt/user/appdata/casedesk/ollama:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - default
    # Für NVIDIA GPU auf Unraid:
    # runtime: nvidia
    # environment:
    #   - NVIDIA_VISIBLE_DEVICES=all

networks:
  default:
    name: casedesk-network
